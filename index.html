<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
<meta name="google-site-verification" content="P_eHMCHl34ZZZo6j2ZpKkeLe14CoxsWRrUZg0Ei2dXA" />
  <title>グラシュリオン設定辞典</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: #faf6e5;
      color: #2c1608;
      font-family: "游明朝", "Yu Mincho", "serif";
      margin: 0; padding: 0;
    }
    header {
      background: linear-gradient(to bottom, #800000, #500000); /* グラデーションで高級感 */
      color: gold;
      text-align: center;
      padding: 1.5em 0;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    h1 {
      margin: 0;
      font-size: 1.8em;
      letter-spacing: 0.1em;
      text-shadow: 2px 2px 0 #000;
    }
    
    /* 検索窓のデザイン */
    .search-box {
      text-align: center;
      margin: 1.5em 0 0.5em 0;
    }
    #searchInput {
      padding: 10px;
      font-size: 16px;
      width: 80%;
      max-width: 400px;
      border: 2px solid #a83e2c;
      border-radius: 8px;
      background: #fff;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin: 1em 0 3em 0;
      padding: 0 10px;
    }
    .category {
      background: #a83e2c;
      color: gold;
      border-radius: 12px;
      margin: 0.8em;
      width: 140px; /* 固定幅で見やすく */
      height: 100px;
      display: flex;
      flex-direction: column; /* アイコンと文字を縦並びに */
      align-items: center;
      justify-content: center;
      font-size: 1.1em;
      box-shadow: 0 4px 0 #7a2a1e; /* 立体的なボタン影 */
      font-family: "游明朝", "Yu Mincho", "serif";
      text-decoration: none;
      text-align: center;
      transition: transform 0.1s, box-shadow 0.1s;
      position: relative;
    }
    .category:active {
      transform: translateY(4px); /* 押した沈み込み */
      box-shadow: 0 0 0 #7a2a1e;
    }
    .category i {
      font-size: 1.8em;
      margin-bottom: 5px;
      color: #ffd700;
    }
    
    /* 検索でヒットしない場合は非表示にするクラス */
    .hidden {
      display: none;
    }

    .footer {
      margin: 3em 0 1.5em 0;
      text-align: center;
      font-size: 0.8em;
      opacity: 0.8;
    }
    .footer a {
      color: #a83e2c;
      margin: 0 1em;
    }
  </style>
</head>
<body>

  <header>
    <h1>グラシュリオン<br>設定辞典</h1>
  </header>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="項目を検索（例：魔法）...">
  </div>

  <div class="container" id="buttonContainer">
    <a class="category" href="monsters.html">
      <i class="fa-solid fa-dragon"></i>
      魔物図鑑
    </a>
    <a class="category" href="dictionary.html">
      <i class="fa-solid fa-book-open"></i>
      用語辞典
    </a>
    <a class="category" href="history.html">
      <i class="fa-solid fa-hourglass-half"></i>
      時代・年表
    </a>
    <a class="category" href="characters.html">
      <i class="fa-solid fa-users"></i>
      キャラクター
    </a>
    <a class="category" href="races.html">
      <i class="fa-solid fa-dna"></i>
      種族
    </a>
    <a class="category" href="myth.html">
      <i class="fa-solid fa-church"></i>
      神話・宗教
    </a>
    <a class="category" href="language.html">
      <i class="fa-solid fa-language"></i>
      言語
    </a>
    <a class="category" href="magic-system/magic.html">
      <i class="fa-solid fa-wand-sparkles"></i>
      魔法体系
    </a>
    <a class="category" href="tools.html">
      <i class="fa-solid fa-hammer"></i>
      装置・道具
    </a>
    <a class="category" href="地名/places.html">
      <i class="fa-solid fa-map-location-dot"></i>
      地名
    </a>
  </div>

  <div class="footer">
    <p>Created with GitHub & AI</p>
    <a href="#">トップに戻る</a>
  </div>

  <script>
    // 検索機能のスクリプト
    document.getElementById('searchInput').addEventListener('keyup', function() {
      let searchValue = this.value.toLowerCase();
      let buttons = document.querySelectorAll('.category');

      buttons.forEach(function(btn) {
        // ボタンの中の文字を取得
        let text = btn.textContent.toLowerCase();
        if(text.includes(searchValue)) {
          btn.classList.remove('hidden');
        } else {
          btn.classList.add('hidden');
        }
      });
    });
  </script>
</body>
</html>
